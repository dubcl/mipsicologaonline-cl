<header class="site-header" id="site-header">
  <div class="container header-inner">
    <a href="#inicio" class="brand">
      <span class="brand-mark" aria-hidden="true">✦</span>
      <span class="brand-text">{{ .Site.Params.psychologistName }}</span>
    </a>

    <nav class="nav" aria-label="Navegación principal">
      <input type="checkbox" id="nav-toggle" class="nav-toggle" aria-hidden="true">
      <label for="nav-toggle" class="nav-burger" aria-label="Abrir menú">
        <span></span><span></span><span></span>
      </label>
      <ul class="nav-list">
        {{ range .Site.Menus.main }}
        <li><a href="{{ .URL }}">{{ .Name }}</a></li>
        {{ end }}
        <li><a href="{{ .Site.Params.bookingUrl }}" class="btn btn-sm" target="_blank" rel="noopener">Agendar hora</a></li>
      </ul>
    </nav>
  </div>
</header>
